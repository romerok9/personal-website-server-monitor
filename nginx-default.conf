server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # Logging
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;

    # Security Headers
    # Clickjacking protection
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # HSTS: force HTTPS for 1 year (Cloudflare handles SSL termination)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # XSS protection (legacy browsers)
    add_header X-XSS-Protection "1; mode=block" always;
    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Content Security Policy
    # Allows: self, Google Analytics, Google Tag Manager, inline scripts (needed for GA)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://www.google-analytics.com; connect-src 'self' https://www.google-analytics.com https://analytics.google.com; font-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self';" always;

    # Main location block
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Blog section - asegurar que /blog/ sirva index.html
    location /blog {
        try_files $uri $uri/ $uri.html /blog/index.html;
    }

    # Status page
    location /status.html {
        try_files $uri =404;
    }

    # Favicon
    location /favicon.svg {
        try_files $uri =404;
    }

    # Error pages
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    # Security: deny access to hidden files
    location ~ /\. {
        deny all;
    }
}

